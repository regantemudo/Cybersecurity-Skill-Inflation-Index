name: CSII — Automated Intelligence Engine

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 6am UTC — fresh weekly data
  workflow_dispatch:        # Manual trigger anytime from Actions tab
    inputs:
      source:
        description: 'Job source to collect from'
        required: false
        default: 'all'
        type: choice
        options: [all, adzuna, jsearch, usajobs]
      dry_run:
        description: 'Dry run (no files saved)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 1: Collect new job listings ──────────────────────────────────
      - name: Collect job listings
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY:${{ secrets.JSEARCH_API_KEY }}
          USAJOBS_API_KEY:${{ secrets.USAJOBS_API_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            python scripts/collect.py --source $SOURCE --dry-run
          else
            python scripts/collect.py --source $SOURCE --max 8
          fi

      # ── Step 2: Extract metrics from all raw files ─────────────────────────
      - name: Extract metrics
        run: python scripts/extract_metrics.py

      # ── Step 3: Calculate indexes ──────────────────────────────────────────
      - name: Calculate inflation index
        run: python scripts/calculate_index.py

      # ── Step 4: Generate all charts + update README ────────────────────────
      - name: Generate reports and charts
        run: python scripts/generate_report.py

      # ── Step 5: Commit everything back to repo ─────────────────────────────
      - name: Commit and push results
        run: |
          git config user.name  "csii-bot"
          git config user.email "csii-bot@github-actions"
          git add data/ reports/ README.md
          MONTH=$(date +%Y-%m)
          JOB_COUNT=$(ls data/raw/$MONTH/*.txt 2>/dev/null | wc -l | tr -d ' ')
          git commit -m "CSII Weekly Update — $MONTH ($JOB_COUNT jobs)" || echo "No changes to commit"
          git push

      # ── On failure: upload logs for debugging ─────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: csii-error-logs
          path: |
            data/processed/
            reports/Monthly-CSII-Report.md
          retention-days: 7
